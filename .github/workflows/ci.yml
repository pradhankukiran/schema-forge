name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore SchemaForge.slnx

      - name: Build
        run: dotnet build SchemaForge.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/SchemaForge.Core.Tests/SchemaForge.Core.Tests.csproj --configuration Release --no-restore
