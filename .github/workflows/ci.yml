name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: |
          dotnet restore src/SchemaForge.Wasm/SchemaForge.Wasm.csproj
          dotnet restore tests/SchemaForge.Core.Tests/SchemaForge.Core.Tests.csproj

      - name: Build
        run: |
          dotnet build src/SchemaForge.Wasm/SchemaForge.Wasm.csproj -c Release --no-restore
          dotnet build tests/SchemaForge.Core.Tests/SchemaForge.Core.Tests.csproj -c Release --no-restore

      - name: Test
        run: dotnet test tests/SchemaForge.Core.Tests/SchemaForge.Core.Tests.csproj -c Release --no-restore
