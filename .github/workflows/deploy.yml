name: Deploy to Vercel
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet restore src/SchemaForge.Wasm/SchemaForge.Wasm.csproj
      - run: dotnet build src/SchemaForge.Wasm/SchemaForge.Wasm.csproj -c Release --no-restore
      - run: dotnet publish src/SchemaForge.Wasm/SchemaForge.Wasm.csproj -c Release -o output --no-restore --nologo
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: blazor-wasm
          path: output/wwwroot
