    <rect x="74" y="0" width="58" height="58" fill="url(#amber)" fill-opacity="0.34"/>
    <rect x="0" y="74" width="58" height="58" fill="#D8EEE8"/>
    <path d="M20 20H38V38H20V20Z" fill="#FFFDF8"/>
    <path d="M94 20H112V38H94V20Z" fill="#FFF4E2"/>
    <path d="M20 94H38V112H20V94Z" fill="#0F766E" fill-opacity="0.72"/>
  </g>

  <g transform="translate(294 112)" fill="#162033">
    <text x="0" y="42" font-family="'Space Grotesk', 'Avenir Next', 'Segoe UI', sans-serif" font-size="22" font-weight="700" letter-spacing="0.34em" fill="#7D8898">SCHEMAFORGE</text>
    <text x="0" y="128" font-family="'Space Grotesk', 'Avenir Next', 'Segoe UI', sans-serif" font-size="74" font-weight="700" letter-spacing="-0.06em">Visual database schema</text>
    <text x="0" y="206" font-family="'Space Grotesk', 'Avenir Next', 'Segoe UI', sans-serif" font-size="74" font-weight="700" letter-spacing="-0.06em">design and SQL prototyping</text>
    <text x="0" y="258" font-family="'Space Grotesk', 'Avenir Next', 'Segoe UI', sans-serif" font-size="28" font-weight="500" fill="#556173">Browser-first ERD studio, DDL import/export, and local SQLite query sandbox.</text>
  </g>

