<svg width="1600" height="460" viewBox="0 0 1600 460" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SchemaForge banner</title>
  <desc id="desc">SchemaForge banner with product title, tagline, and technology chips.</desc>
  <defs>
    <linearGradient id="bg" x1="88" y1="42" x2="1494" y2="418" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF9EE"/>
      <stop offset="1" stop-color="#F3EEE4"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="84" y2="84" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F766E"/>
      <stop offset="1" stop-color="#2D9A91"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="84" y2="84" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C7781F"/>
      <stop offset="1" stop-color="#E39A3D"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="32"/>
    </filter>
  </defs>

  <rect width="1600" height="460" fill="url(#bg)"/>
  <circle cx="132" cy="102" r="118" fill="#F4D9B2" opacity="0.58" filter="url(#soft)"/>
  <circle cx="1452" cy="356" r="132" fill="#CBE8E2" opacity="0.72" filter="url(#soft)"/>
  <rect x="42" y="42" width="1516" height="376" fill="#FFFDF8" fill-opacity="0.72" stroke="#D7DDD4" stroke-width="2"/>

  <g transform="translate(110 112)">
