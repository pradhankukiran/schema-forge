<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SchemaForge</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="_content/SchemaForge.Shared/css/app.css" />
    <link href="SchemaForge.Wasm.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:Inter,sans-serif;color:#4A4A4A;">
            <div style="text-align:center;">
                <div style="font-size:20px;font-weight:700;color:#1B5E9E;margin-bottom:8px;">SchemaForge</div>
                <div style="font-size:13px;color:#999;">Loading...</div>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui" style="display:none;position:fixed;bottom:0;left:0;right:0;padding:8px 16px;background:#C62828;color:white;font-family:Inter,sans-serif;font-size:13px;">
        An unhandled error has occurred.
        <a href="." style="color:white;text-decoration:underline;">Reload</a>
        <span style="cursor:pointer;margin-left:8px;" onclick="this.parentElement.style.display='none';">Dismiss</span>
    </div>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
